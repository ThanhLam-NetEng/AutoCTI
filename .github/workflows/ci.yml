name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # tắt warning Node.js deprecation

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install pytest flake8 requests python-dotenv

      - name: Lint — syntax errors (hard fail)
        run: |
          flake8 src/ tests/ \
            --exclude=cti_env,__pycache__,.git \
            --select=E9,F63,F7,F82 \
            --show-source

      - name: Lint — style warnings (soft)
        run: |
          flake8 src/ tests/ \
            --exclude=cti_env,__pycache__,.git \
            --exit-zero \
            --max-line-length=100

      - name: Run unit tests
        run: pytest tests/ -v