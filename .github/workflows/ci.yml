name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install pytest flake8

      - name: Lint — syntax errors (hard fail)
        run: flake8 src/ tests/ --select=E9,F63,F7,F82 --show-source

      - name: Lint — style warnings (soft)
        run: flake8 src/ tests/ --exit-zero --max-line-length=100

      - name: Run unit tests
        run: pytest tests/ -v
