<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
<title>AutoCTI v2.0 — System Architecture</title>
<desc>Event-driven CTI platform: Telegram webhook flows through API Gateway and SQS into an EC2 Docker worker running Gemini 2.5 Flash with LangGraph ReAct and Tavily Search, storing memory and audit logs in DynamoDB. A Hunter cronjob delivers daily briefings.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text font-size="13" font-weight="600" fill="#185FA5" x="50" y="22">AutoCTI v2.0 — Architecture</text>

<!-- Telegram -->
<rect x="170" y="38" width="220" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="280" y="60" text-anchor="middle" dominant-baseline="central">Telegram</text>

<!-- Arrow Telegram to API GW -->
<line x1="280" y1="82" x2="280" y2="110" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="294" y="98" dominant-baseline="central">webhook</text>

<!-- API Gateway -->
<rect x="170" y="112" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="280" y="134" text-anchor="middle" dominant-baseline="central">API Gateway</text>

<!-- Arrow API GW to SQS -->
<line x1="280" y1="156" x2="280" y2="184" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="294" y="172" dominant-baseline="central">enqueue</text>

<!-- SQS -->
<rect x="170" y="186" width="220" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#712B13" x="280" y="208" text-anchor="middle" dominant-baseline="central">Amazon SQS</text>

<!-- Arrow SQS to EC2 -->
<line x1="280" y1="230" x2="280" y2="268" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="294" y="251" dominant-baseline="central">long poll</text>

<!-- EC2 Worker Container -->
<rect x="50" y="256" width="470" height="208" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="6 3"/>
<text font-size="12" fill="#888780" x="68" y="272" dominant-baseline="central">EC2 Worker — Docker</text>

<!-- Gemini LangGraph box -->
<rect x="65" y="278" width="305" height="164" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="218" y="310" text-anchor="middle" dominant-baseline="central">Gemini 2.5 Flash</text>
<text font-size="12" fill="#185FA5" x="218" y="332" text-anchor="middle" dominant-baseline="central">LangGraph ReAct Agent</text>
<line x1="78" y1="346" x2="358" y2="346" stroke="#185FA5" stroke-width="0.5" opacity="0.3"/>
<text font-size="12" fill="#185FA5" x="218" y="364" text-anchor="middle" dominant-baseline="central">Whitelist · Rate limit · Memory</text>
<text font-size="12" fill="#185FA5" x="218" y="384" text-anchor="middle" dominant-baseline="central">Retry · Backoff · CTI output</text>
<text font-size="12" fill="#185FA5" x="218" y="404" text-anchor="middle" dominant-baseline="central">Conversation context (k=10)</text>

<!-- Dashed Gemini to Tavily -->
<line x1="372" y1="342" x2="396" y2="342" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<line x1="396" y1="358" x2="372" y2="358" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

<!-- Tavily -->
<rect x="398" y="322" width="108" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="452" y="346" text-anchor="middle" dominant-baseline="central">Tavily</text>
<text font-size="12" fill="#0F6E56" x="452" y="366" text-anchor="middle" dominant-baseline="central">Search API</text>

<!-- Arrow EC2 to DynamoDB -->
<line x1="280" y1="442" x2="280" y2="470" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="294" y="458" dominant-baseline="central">memory</text>

<!-- DynamoDB -->
<rect x="80" y="472" width="400" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="280" y="494" text-anchor="middle" dominant-baseline="central">Amazon DynamoDB</text>

<!-- Hunter -->
<rect x="538" y="38" width="120" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="598" y="62" text-anchor="middle" dominant-baseline="central">Hunter</text>
<text font-size="12" fill="#534AB7" x="598" y="82" text-anchor="middle" dominant-baseline="central">Cronjob · 8AM</text>

<!-- Arrow Hunter to Telegram briefing -->
<line x1="536" y1="60" x2="392" y2="60" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="12" fill="#534AB7" x="464" y="50" text-anchor="middle" dominant-baseline="central">briefing</text>

<!-- Arrow Hunter to DynamoDB -->
<path d="M 598 108 L 598 136 L 644 136 L 644 494 L 482 494" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- Reply arrow EC2 to Telegram -->
<path d="M 50 354 L 26 354 L 26 60 L 168 60" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="12" fill="#185FA5" x="42" y="210" dominant-baseline="central">reply</text>

<!-- Legend -->
<line x1="50" y1="538" x2="76" y2="538" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="82" y="538" dominant-baseline="central">main flow</text>
<line x1="168" y1="538" x2="194" y2="538" stroke="#444441" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="200" y="538" dominant-baseline="central">async / reply</text>
<text font-size="12" fill="#B4B2A9" x="630" y="538" text-anchor="end" dominant-baseline="central">AWS Free Tier · ~$0/month</text>
</svg>
